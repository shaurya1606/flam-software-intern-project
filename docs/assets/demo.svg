<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540">
  <rect width="1200" height="540" fill="#020617"/>
  <rect x="40" y="40" width="1120" height="460" rx="24" fill="#111827" stroke="#38bdf8" stroke-width="2"/>
  <text x="100" y="160" fill="#f8fafc" font-size="34" font-family="Segoe UI, Arial, sans-serif">Demo</text>
  <text x="100" y="220" fill="#cbd5e1" font-size="24" font-family="Consolas, monospace">$ queuectl enqueue '{"id":"job1","command":"echo hello"}'</text>
  <text x="100" y="280" fill="#cbd5e1" font-size="24" font-family="Consolas, monospace">✔ Job 'job1' enqueued.</text>
  <text x="100" y="340" fill="#cbd5e1" font-size="24" font-family="Consolas, monospace">$ queuectl worker start --count 1</text>
  <text x="100" y="400" fill="#38bdf8" font-size="24" font-family="Consolas, monospace">✔ Started 1 worker.</text>
</svg>